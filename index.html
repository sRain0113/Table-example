<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Table</title>
    <style>
        table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
            text-align: left;
            padding: 5px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>StudentID</th>
        </tr>
        <tr>
            <td>Your name</td>
            <td>Your student ID</td>
        </tr>
    </table>

</body>

</html>
